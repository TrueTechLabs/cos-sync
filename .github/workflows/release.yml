name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Build
        run: make build VERSION=${GITHUB_REF_NAME}
      - name: Package
        run: |
          cd dist
          for bin in cos-sync-linux-amd64 cos-sync-linux-arm64 \
                     cos-sync-darwin-amd64 cos-sync-darwin-arm64; do
            tar -czf "$bin.tar.gz" "$bin"
            rm "$bin"
          done
          zip -q cos-sync-windows-amd64.zip cos-sync-windows-amd64.exe
          rm cos-sync-windows-amd64.exe
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt \
            --title "${GITHUB_REF_NAME}" --generate-notes --draft
